<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" 
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <a class="navbar-brand" href="/">Cinema</a>
    
        <button class="navbar-toggler" type="button"
            data-toggle="collapse" 
            data-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button> 
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/filme/">Filmes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/serie/">Séries</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/pessoa/">Pessoas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/genero/">Gênero</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/pais/">Países</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/continente/">Continente</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/temporada/">Temporadas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/episodio/">Episódios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/">Administração</a>
                </li>
            </ul>
        </div>
    </nav>
    

<div class="container mt-5">
    <h2 class="mb-4">Gênero</h2>
    <table class="table table-striped table-bordered">
        <thead class="thead-dark">
            <tr>
                <th>Gênero</th>
            </tr>
        </thead>

        <tbody>
            {% for genero in generos %}
            <tr>
                <td>{{ genero.nome }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
</div>

<!-- jQuery, Popper.js e Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
